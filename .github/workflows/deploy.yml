name: Build and Deploy Pay2Bill to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOLUTION_FILE: Pay2Bill.sln
  BUILD_CONFIGURATION: Release
  AZURE_WEBAPP_NAME: pay2bill-app

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Restore NuGet Packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build and Publish
        run: |
          msbuild Pay2Bill\Pay2Bill.csproj `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:publishUrl=publish `
            /p:SkipInvalidConfigurations=true

      - name: Create Zip Package
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Compress-Archive -Path "Pay2Bill\publish\*" -DestinationPath "artifacts\pay2bill.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pay2bill-webapp
          path: artifacts\pay2bill.zip
          retention-days: 5

  deploy-dev:
    name: Deploy to Dev Slot
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: dev
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: pay2bill-webapp
          path: artifact

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Dev Slot
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: dev
          package: artifact/pay2bill.zip
