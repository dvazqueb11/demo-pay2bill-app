name: Build and Deploy Pay2Bill to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOLUTION_FILE: Pay2Bill.sln
  BUILD_CONFIGURATION: Release
  AZURE_WEBAPP_NAME: pay2bill-app

jobs:
  build-and-deploy:
    name: Build and Deploy to Dev Slot
    runs-on: windows-latest
    permissions:
      contents: read

    environment:
      name: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Restore NuGet Packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: |
          msbuild ${{ env.SOLUTION_FILE }} `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=Package `
            /p:PackageAsSingleFile=true `
            /p:SkipInvalidConfigurations=true `
            /p:PackageLocation="${{ github.workspace }}\artifacts"

      - name: Extract Web Deploy Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deploy -Force
          Expand-Archive -Path "${{ github.workspace }}\artifacts\Pay2Bill.zip" -DestinationPath extracted
          $contentPath = Get-ChildItem -Path extracted -Recurse -Directory -Filter "PackageTmp" | Select-Object -First 1
          Copy-Item -Path "$($contentPath.FullName)\*" -Destination deploy -Recurse
          Write-Host "Files ready for deployment:"
          Get-ChildItem deploy | Format-Table Name

      - name: Create Clean Zip
        shell: pwsh
        run: |
          Compress-Archive -Path "deploy\*" -DestinationPath "pay2bill-deploy.zip"
          Write-Host "Deploy zip size: $([math]::Round((Get-Item pay2bill-deploy.zip).Length / 1MB, 2)) MB"

      - name: Deploy to Dev Slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: dev
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
          package: pay2bill-deploy.zip
