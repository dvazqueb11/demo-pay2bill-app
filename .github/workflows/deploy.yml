name: Build and Deploy Pay2Bill to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOLUTION_FILE: Pay2Bill.sln
  BUILD_CONFIGURATION: Release
  AZURE_WEBAPP_NAME: pay2bill-app

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Restore NuGet Packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: |
          msbuild ${{ env.SOLUTION_FILE }} `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=Package `
            /p:PackageAsSingleFile=true `
            /p:SkipInvalidConfigurations=true `
            /p:PackageLocation="${{ github.workspace }}\artifacts"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pay2bill-webapp
          path: ${{ github.workspace }}\artifacts\Pay2Bill.zip
          retention-days: 5

  deploy-dev:
    name: Deploy to Dev Slot
    runs-on: windows-latest
    needs: build
    permissions: {}
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: dev

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: pay2bill-webapp
          path: artifact

      - name: Deploy to Dev Slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: dev
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
          package: artifact/Pay2Bill.zip
